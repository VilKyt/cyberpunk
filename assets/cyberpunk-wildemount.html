<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyberpunk Wildemount — Neon Atlas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

  :root {
    --neon-cyan: #00f5ff;
    --neon-magenta: #ff006e;
    --neon-yellow: #ffd60a;
    --neon-green: #39ff14;
    --neon-orange: #ff6b00;
    --neon-purple: #bc13fe;
    --dark-bg: #020812;
    --grid-color: rgba(0,245,255,0.07);
    --map-bg: #060e1a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark-bg);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, rgba(2,8,18,0.98) 0%, rgba(2,8,18,0.0) 100%);
  }
  .header-title {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 1.1rem;
    color: var(--neon-cyan);
    text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px rgba(0,245,255,0.3);
    letter-spacing: 0.2em;
  }
  .header-sub {
    font-size: 0.6rem;
    color: rgba(0,245,255,0.5);
    letter-spacing: 0.15em;
    margin-top: 2px;
  }
  .header-right {
    font-size: 0.6rem;
    color: rgba(0,245,255,0.4);
    text-align: right;
    line-height: 1.8;
  }
  .blink { animation: blink 1.4s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .map-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    cursor: grab;
  }
  .map-container:active { cursor: grabbing; }

  .map-world {
    position: absolute;
    width: 1400px;
    height: 900px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);
    transform-origin: center center;
    transition: transform 0.1s ease;
  }

  /* SVG Map */
  svg.map-svg {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0; left: 0;
  }

  /* Scanline overlay */
  .scanlines {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 50;
  }

  /* Vignette */
  .vignette {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(2,8,18,0.85) 100%);
    pointer-events: none;
    z-index: 49;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: rgba(2,8,18,0.95);
    border: 1px solid var(--neon-cyan);
    box-shadow: 0 0 20px rgba(0,245,255,0.3), inset 0 0 20px rgba(0,245,255,0.03);
    padding: 10px 14px;
    max-width: 220px;
    pointer-events: none;
    z-index: 200;
    display: none;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
  }
  .tooltip.visible { display: block; }
  .tooltip-name {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan);
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .tooltip-orig {
    font-size: 0.5rem;
    color: rgba(0,245,255,0.4);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }
  .tooltip-desc {
    font-size: 0.55rem;
    color: rgba(200,230,255,0.7);
    line-height: 1.5;
    font-family: 'Rajdhani', sans-serif;
  }
  .tooltip-type {
    margin-top: 6px;
    font-size: 0.5rem;
    padding: 2px 6px;
    display: inline-block;
  }

  /* Legend */
  .legend {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(2,8,18,0.92);
    border: 1px solid rgba(0,245,255,0.2);
    padding: 12px 16px;
    z-index: 100;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  }
  .legend-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.5rem;
    color: rgba(0,245,255,0.6);
    letter-spacing: 0.15em;
    margin-bottom: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    font-size: 0.5rem;
    color: rgba(200,230,255,0.6);
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Compass */
  .compass {
    position: fixed;
    top: 70px;
    right: 24px;
    width: 60px;
    height: 60px;
    z-index: 100;
  }

  /* Zoom controls */
  .zoom-controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 100;
  }
  .zoom-btn {
    width: 32px; height: 32px;
    background: rgba(2,8,18,0.92);
    border: 1px solid rgba(0,245,255,0.3);
    color: var(--neon-cyan);
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .zoom-btn:hover {
    background: rgba(0,245,255,0.1);
    box-shadow: 0 0 12px rgba(0,245,255,0.4);
  }

  /* Pulse animation for Night City */
  @keyframes pulse-ring {
    0% { r: 28; opacity: 0.8; }
    100% { r: 50; opacity: 0; }
  }
  .pulse-ring { animation: pulse-ring 2s ease-out infinite; }
  @keyframes pulse-ring2 {
    0% { r: 28; opacity: 0.6; }
    100% { r: 50; opacity: 0; }
  }
  .pulse-ring2 { animation: pulse-ring2 2s ease-out infinite; animation-delay: 0.7s; }

  /* Road dash animation */
  @keyframes dash-flow {
    to { stroke-dashoffset: -40; }
  }
  .road-animated { animation: dash-flow 2s linear infinite; }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.4; }
    97% { opacity: 1; }
    98% { opacity: 0.2; }
  }

</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">WILDEMOUNT — NEON ATLAS</div>
    <div class="header-sub">CLASSIFIED CARTOGRAPHIC DATA // ARASAKA CORP // CLEARANCE: ALPHA</div>
  </div>
  <div class="header-right">
    <span class="blink">● LIVE</span> UPLINK<br>
    SECTOR MAP v4.7.1<br>
    <span style="color:var(--neon-magenta)">THREAT LVL: CRITICAL</span>
  </div>
</div>

<div class="map-container" id="mapContainer">
  <div class="map-world" id="mapWorld">
    <svg class="map-svg" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Grid pattern -->
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,245,255,0.06)" stroke-width="0.5"/>
        </pattern>
        <pattern id="grid-large" width="200" height="200" patternUnits="userSpaceOnUse">
          <path d="M 200 0 L 0 0 0 200" fill="none" stroke="rgba(0,245,255,0.12)" stroke-width="1"/>
        </pattern>

        <!-- Glows -->
        <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-strong" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="8" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-text" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="mountain-glow">
          <feGaussianBlur stdDeviation="1.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <!-- Radial for ocean -->
        <radialGradient id="ocean-grad" cx="50%" cy="50%" r="60%">
          <stop offset="0%" stop-color="#020e1f"/>
          <stop offset="100%" stop-color="#010810"/>
        </radialGradient>

        <!-- Night City glow -->
        <radialGradient id="city-glow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ff006e" stop-opacity="0.4"/>
          <stop offset="50%" stop-color="#bc13fe" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>

        <!-- Region fills -->
        <linearGradient id="badlands-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#1a0e00" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#2d1a00" stop-opacity="0.7"/>
        </linearGradient>
        <linearGradient id="tundra-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#001a2d" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#00102a" stop-opacity="0.7"/>
        </linearGradient>
        <linearGradient id="empire-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#0a1a00" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#0d2200" stop-opacity="0.6"/>
        </linearGradient>
        <linearGradient id="blightshore-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#1a0000" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#2a0a0a" stop-opacity="0.7"/>
        </linearGradient>
      </defs>

      <!-- Ocean background -->
      <rect width="1400" height="900" fill="url(#ocean-grad)"/>
      <rect width="1400" height="900" fill="url(#grid)"/>
      <rect width="1400" height="900" fill="url(#grid-large)"/>

      <!-- Subtle ocean hex pattern -->
      <g opacity="0.04" stroke="#00f5ff" stroke-width="0.5" fill="none">
        <path d="M0,450 Q200,400 400,450 Q600,500 800,450 Q1000,400 1200,450 Q1300,475 1400,450"/>
        <path d="M0,470 Q200,420 400,470 Q600,520 800,470 Q1000,420 1200,470 Q1300,495 1400,470"/>
        <path d="M0,430 Q200,380 400,430 Q600,480 800,430 Q1000,380 1200,430 Q1300,455 1400,430"/>
      </g>

      <!-- ==================== CONTINENT LANDMASS ==================== -->
      <!-- Main landmass - keeping Wildemount shape roughly intact -->
      <!-- Northern ice region (Eiselcross) -->
      <polygon points="280,30 620,20 740,80 700,140 560,160 420,150 300,120 240,80"
        fill="#041220" stroke="#00f5ff" stroke-width="0.8" opacity="0.9"/>

      <!-- Greying Wildlands / upper right tundra -->
      <polygon points="740,80 960,30 1100,100 1060,200 900,220 780,180 700,140"
        fill="#04121a" stroke="#00f5ff" stroke-width="0.8" opacity="0.9"/>

      <!-- Main central continent -->
      <polygon points="200,150 380,130 560,160 740,140 900,220 1050,200 1150,280 1180,400 1150,520 1100,600 980,680 820,700 680,720 540,700 400,660 280,600 180,520 140,400 160,300 200,150"
        fill="#040d18" stroke="#00f5ff" stroke-width="1" opacity="0.95"/>

      <!-- Menagerie Coast (left protrusion) -->
      <polygon points="140,360 200,320 200,460 160,500 120,480 100,420"
        fill="#040d18" stroke="#00f5ff" stroke-width="0.8" opacity="0.9"/>

      <!-- Blightshore (far right) -->
      <polygon points="1150,300 1280,280 1360,360 1360,520 1280,580 1180,540 1150,440"
        fill="#140408" stroke="#ff006e" stroke-width="0.8" opacity="0.85"/>

      <!-- Southern islands / archipelago -->
      <ellipse cx="380" cy="780" rx="60" ry="25" fill="#040d18" stroke="#00f5ff" stroke-width="0.6" opacity="0.8"/>
      <ellipse cx="280" cy="820" rx="35" ry="15" fill="#040d18" stroke="#00f5ff" stroke-width="0.6" opacity="0.7"/>
      <ellipse cx="600" cy="800" rx="45" ry="18" fill="#040d18" stroke="#00f5ff" stroke-width="0.6" opacity="0.7"/>
      <ellipse cx="200" cy="870" rx="28" ry="12" fill="#040d18" stroke="#00f5ff" stroke-width="0.5" opacity="0.6"/>
      <ellipse cx="1020" cy="760" rx="40" ry="16" fill="#040d18" stroke="#00f5ff" stroke-width="0.6" opacity="0.6"/>

      <!-- ==================== REGION FILLS ==================== -->
      <!-- Eiselcross / Northern Wastes -->
      <polygon points="280,35 620,22 735,82 695,138 558,158 418,148 300,118 242,78"
        fill="url(#tundra-grad)" opacity="0.8"/>

      <!-- Greying Wildlands / Eastern Tundra -->
      <polygon points="742,82 958,32 1098,102 1058,198 898,218 778,178 702,142"
        fill="url(#tundra-grad)" opacity="0.7"/>

      <!-- Empire zones (green tinge - corps territory) -->
      <polygon points="300,200 560,180 700,240 680,380 560,420 400,400 280,360 240,280"
        fill="url(#empire-grad)" opacity="0.6"/>

      <!-- Xhorhas / Eastern corp zones -->
      <polygon points="780,230 1000,240 1080,320 1050,450 920,500 780,460 720,360 740,280"
        fill="url(#badlands-grad)" opacity="0.6"/>

      <!-- Blightshore fill -->
      <polygon points="1152,302 1278,282 1358,362 1358,518 1278,578 1182,542 1152,442"
        fill="url(#blightshore-grad)" opacity="0.7"/>

      <!-- ==================== MOUNTAINS ==================== -->
      <!-- Mountain ranges - stylized as spiky silhouettes with neon outlines -->
      <!-- Saber Peaks / Western Spine -->
      <g filter="url(#mountain-glow)" opacity="0.85">
        <!-- Western mountain spine -->
        <g stroke="#4af0ff" stroke-width="0.8" fill="#030f1c">
          <polygon points="228,250 218,290 238,290" opacity="0.9"/>
          <polygon points="248,245 235,292 261,292" opacity="0.9"/>
          <polygon points="268,240 252,294 284,294" opacity="0.9"/>
          <polygon points="290,238 272,296 308,296" opacity="0.9"/>
          <polygon points="310,242 294,294 326,294" opacity="0.9"/>
          <polygon points="330,246 314,292 346,292" opacity="0.8"/>
          <polygon points="268,295 258,320 278,320" opacity="0.8"/>
          <polygon points="290,298 278,322 302,322" opacity="0.8"/>
          <polygon points="312,296 300,320 324,320" opacity="0.8"/>
        </g>
        <!-- Dunrock Range (central north) -->
        <g stroke="#4af0ff" stroke-width="0.8" fill="#030f1c">
          <polygon points="550,180 538,215 562,215" opacity="0.9"/>
          <polygon points="572,175 558,218 586,218" opacity="0.9"/>
          <polygon points="594,178 580,215 608,215" opacity="0.85"/>
          <polygon points="614,182 600,214 628,214" opacity="0.8"/>
          <polygon points="560,216 550,238 570,238" opacity="0.8"/>
          <polygon points="580,218 570,240 590,240" opacity="0.8"/>
          <polygon points="600,216 590,238 610,238" opacity="0.75"/>
        </g>
        <!-- Cyrios Mountains (central-western) -->
        <g stroke="#4af0ff" stroke-width="0.8" fill="#030f1c">
          <polygon points="360,340 346,382 374,382" opacity="0.9"/>
          <polygon points="382,334 366,385 398,385" opacity="0.9"/>
          <polygon points="406,330 388,388 424,388" opacity="0.95"/>
          <polygon points="430,332 412,386 448,386" opacity="0.9"/>
          <polygon points="452,336 436,382 468,382" opacity="0.85"/>
          <polygon points="472,340 458,380 486,380" opacity="0.8"/>
          <polygon points="390,386 378,410 402,410" opacity="0.8"/>
          <polygon points="414,388 402,412 426,412" opacity="0.8"/>
          <polygon points="436,384 424,408 448,408" opacity="0.75"/>
          <!-- Taller peaks -->
          <polygon points="406,290 388,342 424,342" opacity="0.95" stroke="#00f5ff" stroke-width="1.2"/>
          <polygon points="430,286 410,344 450,344" opacity="0.9" stroke="#00f5ff" stroke-width="1"/>
        </g>
        <!-- Ashkeeper Peaks (south central) -->
        <g stroke="#4af0ff" stroke-width="0.7" fill="#030f1c">
          <polygon points="480,460 468,496 492,496" opacity="0.9"/>
          <polygon points="500,454 486,498 514,498" opacity="0.9"/>
          <polygon points="522,452 506,500 538,500" opacity="0.9"/>
          <polygon points="544,456 528,498 560,498" opacity="0.85"/>
          <polygon points="510,498 498,520 522,520" opacity="0.8"/>
          <polygon points="532,500 520,522 544,522" opacity="0.8"/>
        </g>
        <!-- Penumbra Range (far east, Blightshore edge) -->
        <g stroke="#ff4080" stroke-width="0.8" fill="#1a0408">
          <polygon points="1160,360 1148,400 1172,400" opacity="0.9"/>
          <polygon points="1182,354 1168,402 1196,402" opacity="0.9"/>
          <polygon points="1200,350 1184,404 1216,404" opacity="0.9"/>
          <polygon points="1220,354 1204,402 1236,402" opacity="0.85"/>
          <polygon points="1188,402 1176,426 1200,426" opacity="0.8"/>
          <polygon points="1210,404 1198,428 1222,428" opacity="0.8"/>
        </g>
        <!-- Icespire Peak area (far north Eiselcross) -->
        <g stroke="#80e0ff" stroke-width="0.8" fill="#020e18">
          <polygon points="460,60 446,100 474,100" opacity="0.9"/>
          <polygon points="482,54 466,102 498,102" opacity="0.9"/>
          <polygon points="504,58 488,100 520,100" opacity="0.85"/>
          <polygon points="522,62 508,98 536,98" opacity="0.8"/>
          <polygon points="470,100 460,122 480,122" opacity="0.75"/>
          <polygon points="492,102 482,124 502,124" opacity="0.75"/>
        </g>
        <!-- Flotket Alps (northeast) -->
        <g stroke="#60c8ff" stroke-width="0.7" fill="#021018">
          <polygon points="890,160 878,198 902,198" opacity="0.85"/>
          <polygon points="910,155 896,200 924,200" opacity="0.85"/>
          <polygon points="930,158 916,198 944,198" opacity="0.8"/>
          <polygon points="898,198 888,218 908,218" opacity="0.75"/>
          <polygon points="918,200 908,220 928,220" opacity="0.75"/>
        </g>
      </g>

      <!-- ==================== ROADS/MEGAWAYS ==================== -->
      <!-- Main Megaways connecting regions - animated neon roads -->
      <g>
        <!-- Night City to North (to Eiselcross Gate) -->
        <path d="M680,440 L660,360 L620,280 L580,200 L540,160" 
          stroke="rgba(0,245,255,0.15)" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M680,440 L660,360 L620,280 L580,200 L540,160" 
          stroke="#00f5ff" stroke-width="1.5" fill="none" stroke-linecap="round"
          stroke-dasharray="8,6" class="road-animated" filter="url(#glow-cyan)"/>

        <!-- Night City to West (Menagerie Coast) -->
        <path d="M640,460 L560,460 L460,450 L360,440 L260,430 L180,420"
          stroke="rgba(0,245,255,0.15)" stroke-width="6" fill="none"/>
        <path d="M640,460 L560,460 L460,450 L360,440 L260,430 L180,420"
          stroke="#00f5ff" stroke-width="1.5" fill="none"
          stroke-dasharray="8,6" class="road-animated" filter="url(#glow-cyan)"/>

        <!-- Night City to East (Xhorhas / Blightshore) -->
        <path d="M740,460 L840,450 L940,440 L1040,420 L1140,400 L1220,380"
          stroke="rgba(255,0,110,0.15)" stroke-width="6" fill="none"/>
        <path d="M740,460 L840,450 L940,440 L1040,420 L1140,400 L1220,380"
          stroke="#ff006e" stroke-width="1.5" fill="none"
          stroke-dasharray="8,6" class="road-animated" filter="url(#glow-cyan)"/>

        <!-- Night City to Southwest -->
        <path d="M660,500 L580,560 L480,600 L380,620 L280,610"
          stroke="rgba(0,245,255,0.12)" stroke-width="5" fill="none"/>
        <path d="M660,500 L580,560 L480,600 L380,620 L280,610"
          stroke="#00f5ff" stroke-width="1.2" fill="none"
          stroke-dasharray="6,8" class="road-animated" filter="url(#glow-cyan)"/>

        <!-- Night City to Southeast -->
        <path d="M720,500 L800,560 L880,620 L960,660 L1040,680"
          stroke="rgba(188,19,254,0.15)" stroke-width="5" fill="none"/>
        <path d="M720,500 L800,560 L880,620 L960,660 L1040,680"
          stroke="#bc13fe" stroke-width="1.2" fill="none"
          stroke-dasharray="6,8" class="road-animated" filter="url(#glow-cyan)"/>

        <!-- Cross-route: NW connecting road -->
        <path d="M300,350 L380,380 L460,410 L540,430 L620,450"
          stroke="rgba(57,255,20,0.12)" stroke-width="4" fill="none"/>
        <path d="M300,350 L380,380 L460,410 L540,430 L620,450"
          stroke="#39ff14" stroke-width="1" fill="none"
          stroke-dasharray="5,9" class="road-animated" filter="url(#glow-cyan)"/>

        <!-- Northern cross-route -->
        <path d="M400,200 L500,220 L600,240 L700,260 L800,270 L900,260"
          stroke="rgba(0,245,255,0.1)" stroke-width="3" fill="none"/>
        <path d="M400,200 L500,220 L600,240 L700,260 L800,270 L900,260"
          stroke="#00f5ff" stroke-width="0.8" fill="none"
          stroke-dasharray="4,10" class="road-animated" opacity="0.6"/>

        <!-- Badlands route east -->
        <path d="M900,260 L980,300 L1060,340 L1120,380"
          stroke="rgba(255,107,0,0.15)" stroke-width="4" fill="none"/>
        <path d="M900,260 L980,300 L1060,340 L1120,380"
          stroke="#ff6b00" stroke-width="1" fill="none"

<script>
  const mapWorld = document.getElementById('mapWorld');
  const mapContainer = document.getElementById('mapContainer');
  const tooltip = document.getElementById('tooltip');

  let scale = 1, minScale = 0.4, maxScale = 3;
  let translateX = 0, translateY = 0;
  let isDragging = false, startX, startY, startTX, startTY;

  function updateTransform() {
    mapWorld.style.transform = `translate(calc(-50% + ${translateX}px), calc(-50% + ${translateY}px)) scale(${scale})`;
  }

  // Zoom
  mapContainer.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    scale = Math.min(maxScale, Math.max(minScale, scale * delta));
    updateTransform();
  });

  document.getElementById('zoomIn').onclick = () => { scale = Math.min(maxScale, scale * 1.2); updateTransform(); };
  document.getElementById('zoomOut').onclick = () => { scale = Math.max(minScale, scale * 0.8); updateTransform(); };
  document.getElementById('zoomReset').onclick = () => { scale = 1; translateX = 0; translateY = 0; updateTransform(); };

  // Drag
  mapContainer.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX; startY = e.clientY;
    startTX = translateX; startTY = translateY;
  });
  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    translateX = startTX + (e.clientX - startX);
    translateY = startTY + (e.clientY - startY);
    updateTransform();
  });
  window.addEventListener('mouseup', () => { isDragging = false; });

  // Touch
  let lastTouchDist = null;
  mapContainer.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      isDragging = true;
      startX = e.touches[0].clientX; startY = e.touches[0].clientY;
      startTX = translateX; startTY = translateY;
    }
  });
  mapContainer.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
      translateX = startTX + (e.touches[0].clientX - startX);
      translateY = startTY + (e.touches[0].clientY - startY);
      updateTransform();
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      if (lastTouchDist) { scale = Math.min(maxScale, Math.max(minScale, scale * (dist / lastTouchDist))); updateTransform(); }
      lastTouchDist = dist;
    }
  }, {passive:false});
  mapContainer.addEventListener('touchend', () => { isDragging = false; lastTouchDist = null; });

  // Tooltip on city nodes
  document.querySelectorAll('.city-node').forEach(node => {
    node.style.cursor = 'pointer';
    node.addEventListener('mouseenter', (e) => {
      const name = node.dataset.name;
      const orig = node.dataset.orig;
      const desc = node.dataset.desc;
      const type = node.dataset.type;
      document.getElementById('tt-name').textContent = name;
      document.getElementById('tt-orig').textContent = `formerly: ${orig}`;
      document.getElementById('tt-desc').textContent = desc;
      const typeEl = document.getElementById('tt-type');
      typeEl.textContent = `[ ${type} ]`;
      typeEl.style.color = type.includes('CLASSIFIED') ? '#ff004c' : type.includes('CORPO') ? '#39ff14' : type.includes('VOODOO') ? '#bc13fe' : '#00f5ff';
      typeEl.style.border = `1px solid ${typeEl.style.color}`;
      tooltip.classList.add('visible');
    });
    node.addEventListener('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 16) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
    });
    node.addEventListener('mouseleave', () => { tooltip.classList.remove('visible'); });
  });
</script>
